services:
  # ------------------------------- INFRAESTRUTURA MINIO - STORAGE -----------------------------------------
  minio:
    image: quay.io/minio/minio:latest 
    container_name: ct-minio
    ports:
      - "9000:9000" # Porta da API (S3)
      - "9001:9001" # Porta do Console (Web)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"
    volumes:
      - ./minio/data1:/data1
      - ./minio/data2:/data2
      - ./minio/data3:/data3
      - ./minio/data4:/data4
    command: server /data1 /data2 /data3 /data4 --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ------------------------------- INFRAESTRUTURA KAFKA ---------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: ct-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - ./kafka/zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ct-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # canal interno (rede docker: 29092) e canal externo (fora da rede docker: 9092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONNECTIONS_FROM_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,CONNECTIONS_FROM_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONNECTIONS_FROM_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./kafka/data:/var/lib/kafka/data
    healthcheck: 
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"] # fica testando a porta 9092 e, somente quando a porta responder, ele marca healthcheck
      interval: 10s # intervalo entre tentativas
      timeout: 5s # tenta ver se o container esta escutando por 5 segundos
      retries: 5 # tenta 5 vezes

  kafka-init:
    image: confluentinc/cp-kafka:latest
    container_name: ct-kafka-init
    depends_on:
      kafka:
        condition: service_healthy 

    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      sleep 15
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic l01 --replication-factor 1 --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic l03 --replication-factor 1 --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic l06 --replication-factor 1 --partitions 1
      "

  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    deploy:
      resources:
        limits:
          memory: 512MB
        reservations:
          memory: 128MB
    container_name: ct-kafka-consumer
    volumes:
      - ./datalakehouse/raw:/app/datalakehouse/raw
      - ./scripts/kafka_consumer:/app
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully


  kafka-producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    deploy:
      resources:
        limits:
          memory: 256MB
        reservations:
          memory: 128MB      
    container_name: ct-kafka-producer
    volumes:
      - ./data/volume_pedagiado_2025:/app/data/volume_pedagiado_2025
      - ./scripts/kafka_producer:/app
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully         

  # ------------------------------------------------------- INFRAESTRUTURA AIRFLOW ---------------------------------------------------
  postgres:
    image: postgres:13
    container_name: ct-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

# Container que prepara o banco e cria o usuário
  airflow-init:
    build: .
    container_name: ct-airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: bash -c "airflow db upgrade && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin"
    depends_on:
      - postgres

  airflow-webserver:
    build: .
    container_name: ct-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully # SÓ SOBE SE O INIT TERMINAR COM SUCESSO
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/Sao_Paulo # Define o fuso horário padrão que o banco de dados e o agendador usam.
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=America/Sao_Paulo # Horário padrão da página web
      - TZ=America/Sao_Paulo # Configura o relógio do "Sistema Operacional" dentro do container Linux.
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./datalakehouse:/opt/airflow/datalakehouse
      - ./scripts:/opt/airflow/scripts
    user: "50000:0"
    command: webserver

  airflow-scheduler:
    build: .
    container_name: ct-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/Sao_Paulo # Define o fuso horário padrão que o banco de dados e o agendador usam.
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=America/Sao_Paulo # Horário padrão da página web
      - TZ=America/Sao_Paulo # Configura o relógio do "Sistema Operacional" dentro do container Linux.
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./datalakehouse:/opt/airflow/datalakehouse
      - ./scripts:/opt/airflow/scripts
    user: "50000:0"
    command: scheduler